name: Build and Release Windows Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-packages:
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset -y
          $env:PATH += ";C:\Program Files (x86)\WiX Toolset v3.11\bin"
          candle -?
          light -?

      - name: Build installer EXE
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\build-installer.ps1 -PackageType exe

      - name: Build portable app image
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\build-installer.ps1 -PackageType app-image

      - name: Collect and rename release assets
        id: collect
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path .\dist -Filter *.exe -File | Select-Object -First 1
          if (-not $installer) {
            throw "No installer EXE found in dist/."
          }

          $portableDir = Join-Path (Resolve-Path .\dist).Path "Minhaj-Mario"
          if (-not (Test-Path $portableDir)) {
            throw "Portable app-image folder not found at dist/Minhaj-Mario/."
          }

          $installerOut = Join-Path (Resolve-Path .\dist).Path "Minhaj-Mario-installer-$env:RELEASE_VERSION.exe"
          $portableZipOut = Join-Path (Resolve-Path .\dist).Path "Minhaj-Mario-portable-$env:RELEASE_VERSION.zip"

          Copy-Item -Path $installer.FullName -Destination $installerOut -Force
          if (Test-Path $portableZipOut) { Remove-Item $portableZipOut -Force }
          Compress-Archive -Path $portableDir -DestinationPath $portableZipOut

          "installer_path=$installerOut" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "portable_zip_path=$portableZipOut" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            ${{ steps.collect.outputs.installer_path }}
            ${{ steps.collect.outputs.portable_zip_path }}

      - name: Attach packages to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.collect.outputs.installer_path }}
            ${{ steps.collect.outputs.portable_zip_path }}
          generate_release_notes: true
